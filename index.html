<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GMHSS Pishin - Student Record</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <style>
        /* Aapka purana design (CSS) yahan hai */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://cdn.jsdelivr.net/gh/akeelali/jameel-noori-nastaleeq@main/Jameel-Noori-Nastaleeq.ttf') format('truetype');
        }
        
        .urdu-text { font-family: 'Jameel Noori Nastaleeq', serif !important; direction: rtl; font-size: 1.3rem; }
        
        .mobile-container { 
            max-width: 450px; 
            margin: 20px auto; 
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            min-height: 95vh; 
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }
        
        .header { 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white; padding: 30px 15px 35px; 
            border-radius: 0 0 50px 50px;
            position: relative;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .school-name-en { font-size: 1.8rem; font-weight: 800; color: white; text-align: center; }
        .school-name-urdu { font-family: 'Jameel Noori Nastaleeq', serif; font-size: 2.4rem; margin: 15px 0; text-align: center; color: #fff; }
        .estd-badge { background: linear-gradient(135deg, #FFD700, #FFA500); color: #2c3e50; display: block; width: fit-content; margin: 0 auto; padding: 12px 30px; border-radius: 50px; font-weight: bold; }
        
        .lang-switcher { display: flex; background: rgba(255,255,255,0.2); border-radius: 50px; margin: 20px 15px; padding: 5px; }
        .lang-btn { flex: 1; padding: 14px; border: none; border-radius: 50px; font-weight: 600; background: transparent; color: #333; }
        .lang-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        
        .stats-row { display: flex; gap: 12px; padding: 0 15px 25px; }
        .stat-card { background: white; flex: 1; padding: 20px 5px; border-radius: 25px; text-align: center; box-shadow: 0 15px 35px -10px rgba(0,0,0,0.2); }
        .stat-number { font-size: 2.2rem; font-weight: 800; color: #667eea; }
        
        .tab-bar { display: flex; background: #2c3e50; border-radius: 50px; margin: 5px 15px 25px; padding: 5px; }
        .tab { flex: 1; padding: 16px 0; border: none; border-radius: 50px; font-weight: 600; background: transparent; color: white; cursor: pointer; }
        .tab.active { background: linear-gradient(135deg, #f1c40f, #e67e22); color: #2c3e50; }
        
        .panel { display: none; padding: 0 15px 20px; }
        .panel.active { display: block; }
        
        .form-group { margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        input, select, textarea { width: 100%; padding: 16px; border: 2px solid #e0e0e0; border-radius: 20px; }
        
        .photo-area { display: flex; gap: 20px; margin-bottom: 25px; align-items: center; }
        .photo-preview { width: 100px; height: 120px; border-radius: 20px; border: 2px dashed #667eea; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn { width: 100%; padding: 18px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-outline { border: 2px solid #667eea; color: #667eea; background: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }

        .student-card { background: white; border-radius: 25px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .student-avatar { width: 60px; height: 60px; border-radius: 15px; overflow: hidden; background: #eee; }
        .student-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .student-actions { display: flex; gap: 8px; margin-top: 8px; }
        .action-btn { padding: 6px 12px; border-radius: 20px; border: none; font-size: 0.75rem; cursor: pointer; }
        .action-btn.print { background: #3498db; color: white; }
        .action-btn.edit { background: #f39c12; color: white; }
        .action-btn.delete { background: #e74c3c; color: white; }
        
        .bottom-nav { background: #2c3e50; padding: 15px; display: flex; justify-content: space-around; position: sticky; bottom: 0; }
        .nav-item { color: rgba(255,255,255,0.5); text-align: center; font-size: 0.8rem; cursor: pointer; }
        .nav-item.active { color: #f1c40f; }
        .nav-item i { font-size: 1.5rem; display: block; }

        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 30px; border-radius: 50px; z-index: 1000; }
        .hidden { display: none !important; }
        
        .search-export { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-export input { flex: 1; }
        .search-export button { width: auto; padding: 10px 15px; margin-top: 0; }
        
        .certificate-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .certificate-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .certificate {
            border: 10px solid #2c3e50;
            padding: 40px;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, #f5f5f5 100%);
            margin-bottom: 20px;
        }
        
        .certificate h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        
        .certificate h2 {
            font-size: 1.5rem;
            color: #27ae60;
            margin: 20px 0;
            border-bottom: 2px dashed #27ae60;
            padding-bottom: 10px;
        }
        
        .certificate .student-name {
            font-size: 2.5rem;
            color: #e74c3c;
            margin: 30px 0;
            font-weight: bold;
        }
        
        .certificate-details {
            text-align: left;
            margin: 30px 0;
            font-size: 1.1rem;
            line-height: 2;
        }
        
        .certificate-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
        }
        
        .certificate-signature {
            text-align: center;
        }
        
        .certificate-signature .line {
            width: 200px;
            border-top: 2px solid #333;
            margin-top: 40px;
            padding-top: 10px;
        }
        
        .close-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
            cursor: pointer;
            color: #e74c3c;
        }

        /* Button disabled state */
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Success message */
        .success-message {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin: 10px 0;
            animation: fadeOut 3s forwards;
        }

        .error-message {
            background-color: #f44336;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin: 10px 0;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* camera/gallery combined button hint */
        .photo-hint { font-size: 0.75rem; color: #666; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>
<div class="mobile-container">
    <div class="header">
        <div class="school-name-en" id="schoolNameEn">Govt Model Higher Secondary School</div>
        <div class="school-name-urdu" id="schoolNameUrdu">گورنمنٹ ماڈل ہائر سیکنڈری اسکول</div>
        <div class="estd-badge" id="estdBadge">Since 1890 • پشین</div>
    </div>
    
    <div class="lang-switcher">
        <button class="lang-btn active" id="btnEnglish">🇬🇧 English</button>
        <button class="lang-btn" id="btnUrdu">🇵🇰 اردو</button>
    </div>
    
    <div class="stats-row">
        <div class="stat-card"><div class="stat-number" id="totalStudents">0</div><div id="totalLabel">Total</div></div>
        <div class="stat-card"><div class="stat-number">12</div><div id="classesLabel">Classes</div></div>
        <div class="stat-card"><div class="stat-number" id="todayAdded">0</div><div id="todayLabel">Today</div></div>
    </div>
    
    <div class="tab-bar">
        <button class="tab active" data-tab="add"><i class="fas fa-plus"></i> <span class="tab-text" id="tabAddText">Add</span></button>
        <button class="tab" data-tab="list"><i class="fas fa-list"></i> <span class="tab-text" id="tabListText">Records</span></button>
    </div>
    
    <div id="addPanel" class="panel active">
        <div id="messageContainer"></div>
        <div class="photo-area">
            <div class="photo-preview" id="photoPreview"><i class="fas fa-user-graduate" id="userIcon"></i><img id="studentPhoto" class="hidden"></div>
            <button class="btn btn-outline" id="uploadBtn" style="flex:1"><span id="uploadBtnText">Upload Photo</span></button>
            <!-- mobile: accept images from camera and gallery -->
            <input type="file" id="photoInput" accept="image/*" capture="environment" hidden>
        </div>
        <!-- mobile hint: on phone you can choose camera or gallery -->
        <div class="photo-hint" id="photoHint">📸 tap to choose camera or gallery</div>
        <form id="studentForm">
            <input type="text" id="admNo" placeholder="Admission No" required class="form-group" readonly>
            <div class="form-row">
                <input type="text" id="name" placeholder="Student Name" required>
                <select id="class" required>
                    <option value="" id="selectClassOption">Select Class</option>
                    <!-- 14 Classes: Nursery to 12th -->
                    <option value="Nursery">Nursery</option>
                    <option value="KG">KG</option>
                    <option value="1st">1st</option>
                    <option value="2nd">2nd</option>
                    <option value="3rd">3rd</option>
                    <option value="4th">4th</option>
                    <option value="5th">5th</option>
                    <option value="6th">6th</option>
                    <option value="7th">7th</option>
                    <option value="8th">8th</option>
                    <option value="9th">9th</option>
                    <option value="10th">10th</option>
                    <option value="11th">11th</option>
                    <option value="12th">12th</option>
                </select>
            </div>
            <input type="text" id="fatherName" placeholder="Father's Name" required class="form-group">
            <input type="tel" id="phone" placeholder="Phone Number" required class="form-group">
            <div class="form-row">
                <input type="date" id="dob" required>
                <input type="date" id="admissionDate" required> 
            </div>
            <button type="submit" class="btn btn-primary" id="saveBtn">Save to Firebase</button>
            <button type="button" class="btn btn-success hidden" id="updateBtn">Update Record</button>
        </form>
    </div>
    
    <div id="listPanel" class="panel">
        <div class="search-export">
            <input type="text" id="searchInput" placeholder="Search students...">
            <button class="btn btn-success" id="exportExcelBtn" style="width: auto; padding: 10px 15px;"><i class="fas fa-file-excel"></i> Excel</button>
        </div>
        <div id="studentList"></div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item active" data-nav="add"><i class="fas fa-home"></i><span class="nav-text" id="navHomeText">Home</span></div>
        <div class="nav-item" data-nav="list"><i class="fas fa-users"></i><span class="nav-text" id="navStudentsText">Students</span></div>
    </div>
</div>

<!-- Certificate Modal -->
<div id="certificateModal" class="certificate-modal">
    <div class="certificate-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <div id="certificateContent"></div>
        <button class="btn btn-primary" id="printCertificate"><i class="fas fa-print"></i> Print Certificate</button>
    </div>
</div>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAiyuiOWNROyhP0ygKIULfP4jcX9tzjn28",
        authDomain: "model-2da2e.firebaseapp.com",
        databaseURL: "https://model-2da2e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "model-2da2e",
        storageBucket: "model-2da2e.firebasestorage.app",
        messagingSenderId: "704044403504",
        appId: "1:704044403504:web:1e234c58ab9fc4a8bbd6f5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const studentsRef = db.ref('students');
    const counterRef = db.ref('counter'); // For managing admission number sequence

    // DOM Elements
    const e = (id) => document.getElementById(id);
    let students = [];
    let currentId = null;
    let isUrdu = false;
    let isSubmitting = false; // Flag to prevent multiple submissions

    // Translation Data
    const translations = {
        en: {
            schoolName: "Govt Model Higher Secondary School",
            schoolNameUrdu: "گورنمنٹ ماڈل ہائر سیکنڈری اسکول",
            estd: "Since 1890 • پشین",
            total: "Total",
            classes: "Classes",
            today: "Today",
            add: "Add",
            records: "Records",
            uploadPhoto: "📸 Upload Photo",
            admNo: "Admission No",
            studentName: "Student Name",
            selectClass: "Select Class",
            fatherName: "Father's Name",
            phone: "Phone Number",
            save: "Save to Firebase",
            update: "Update Record",
            search: "Search students...",
            home: "Home",
            students: "Students",
            print: "Print",
            edit: "Edit",
            delete: "Delete",
            certificate: "Certificate of Enrollment",
            issuedDate: "Issue Date",
            principal: "Principal",
            class: "Class",
            admNoLabel: "Admission No",
            fatherNameLabel: "Father's Name",
            phoneLabel: "Phone",
            dobLabel: "Date of Birth",
            admissionDateLabel: "Admission Date",
            duplicateAdmNo: "This admission number already exists!",
            saving: "Saving...",
            updating: "Updating...",
            saved: "Data saved successfully!",
            updated: "Record updated successfully!",
            fillAllFields: "Please fill all required fields",
            photoHint: "📸 tap to choose camera or gallery"
        },
        ur: {
            schoolName: "گورنمنٹ ماڈل ہائر سیکنڈری اسکول",
            schoolNameUrdu: "گورنمنٹ ماڈل ہائر سیکنڈری اسکول",
            estd: "1890ء سے • پشین",
            total: "کل طلباء",
            classes: "کلاسز",
            today: "آج کا اندراج",
            add: "اندراج",
            records: "ریکارڈ",
            uploadPhoto: "📸 تصویر اپ لوڈ کریں",
            admNo: "داخلہ نمبر",
            studentName: "طالب علم کا نام",
            selectClass: "کلاس منتخب کریں",
            fatherName: "والد کا نام",
            phone: "فون نمبر",
            save: "فائر بیس میں محفوظ کریں",
            update: "ریکارڈ اپ ڈیٹ کریں",
            search: "طلباء تلاش کریں...",
            home: "ہوم",
            students: "طلباء",
            print: "پرنٹ",
            edit: "ترمیم",
            delete: "حذف",
            certificate: "داخلہ سرٹیفکیٹ",
            issuedDate: "تاریخ اجراء",
            principal: "پرنسپل",
            class: "کلاس",
            admNoLabel: "داخلہ نمبر",
            fatherNameLabel: "والد کا نام",
            phoneLabel: "فون نمبر",
            dobLabel: "تاریخ پیدائش",
            admissionDateLabel: "تاریخ داخلہ",
            duplicateAdmNo: "یہ داخلہ نمبر پہلے سے موجود ہے!",
            saving: "محفوظ ہو رہا ہے...",
            updating: "اپ ڈیٹ ہو رہا ہے...",
            saved: "ڈیٹا کامیابی سے محفوظ ہو گیا!",
            updated: "ریکارڈ کامیابی سے اپ ڈیٹ ہو گیا!",
            fillAllFields: "براہ کرم تمام فیلڈز بھریں",
            photoHint: "📸 کیمرہ یا گیلری سے انتخاب کریں"
        }
    };

    // Language Switch
    e('btnEnglish').addEventListener('click', () => {
        isUrdu = false;
        setLanguage('en');
        e('btnEnglish').classList.add('active');
        e('btnUrdu').classList.remove('active');
    });

    e('btnUrdu').addEventListener('click', () => {
        isUrdu = true;
        setLanguage('ur');
        e('btnUrdu').classList.add('active');
        e('btnEnglish').classList.remove('active');
    });

    function setLanguage(lang) {
        const t = translations[lang];
        
        e('schoolNameEn').textContent = t.schoolName;
        e('schoolNameUrdu').textContent = t.schoolNameUrdu;
        e('estdBadge').textContent = t.estd;
        e('totalLabel').textContent = t.total;
        e('classesLabel').textContent = t.classes;
        e('todayLabel').textContent = t.today;
        e('tabAddText').textContent = t.add;
        e('tabListText').textContent = t.records;
        e('uploadBtnText').textContent = t.uploadPhoto;
        e('admNo').placeholder = t.admNo;
        e('name').placeholder = t.studentName;
        e('fatherName').placeholder = t.fatherName;
        e('phone').placeholder = t.phone;
        e('saveBtn').textContent = t.save;
        e('updateBtn').textContent = t.update;
        e('searchInput').placeholder = t.search;
        e('navHomeText').textContent = t.home;
        e('navStudentsText').textContent = t.students;
        e('photoHint').textContent = t.photoHint;
        
        const selectOption = document.querySelector('#class option[value=""]');
        if (selectOption) selectOption.textContent = t.selectClass;
        
        if (lang === 'ur') {
            document.body.classList.add('urdu-text');
        } else {
            document.body.classList.remove('urdu-text');
        }
    }

    // Function to get next admission number
    async function getNextAdmissionNumber() {
        try {
            const result = await counterRef.child('admissionNo').transaction(function(currentValue) {
                return (currentValue || 0) + 1;
            });
            return result.snapshot.val();
        } catch (error) {
            console.error('Error getting admission number:', error);
            return null;
        }
    }

    // Function to initialize counter if not exists
    async function initializeCounter() {
        const snapshot = await counterRef.child('admissionNo').once('value');
        if (!snapshot.exists()) {
            if (students.length > 0) {
                const maxAdmNo = Math.max(...students.map(s => parseInt(s.admNo) || 0));
                await counterRef.child('admissionNo').set(maxAdmNo);
            } else {
                await counterRef.child('admissionNo').set(0);
            }
        }
    }

    // Load Data
    studentsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        students = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
        renderList();
        updateStats();
        initializeCounter();
    });

    function updateStats() {
        e('totalStudents').textContent = students.length;
        const today = new Date().toDateString();
        e('todayAdded').textContent = students.filter(s => new Date(s.createdAt).toDateString() === today).length;
    }

    // Function to show message
    function showMessage(message, isSuccess = true) {
        const container = e('messageContainer');
        const messageDiv = document.createElement('div');
        messageDiv.className = isSuccess ? 'success-message' : 'error-message';
        messageDiv.textContent = message;
        messageDiv.style.cssText = `
            background-color: ${isSuccess ? '#4CAF50' : '#f44336'};
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin: 10px 0;
            animation: fadeOut 3s forwards;
        `;
        container.innerHTML = '';
        container.appendChild(messageDiv);
        
        setTimeout(() => {
            if (messageDiv.parentNode) {
                messageDiv.remove();
            }
        }, 3000);
    }

    // admissionDate auto-filled (only manual DOB)
    function setAutoAdmissionDate() {
        const today = new Date().toISOString().split('T')[0];
        e('admissionDate').value = today;
    }

    // Form Submit for both Save and Update
    e('studentForm').onsubmit = async (event) => {
        event.preventDefault();
        
        if (isSubmitting) {
            console.log('Already submitting...');
            return;
        }
        
        if (!e('name').value || !e('class').value || !e('fatherName').value || !e('phone').value || !e('dob').value || !e('admissionDate').value) {
            showMessage(translations[isUrdu ? 'ur' : 'en'].fillAllFields, false);
            return;
        }
        
        const t = translations[isUrdu ? 'ur' : 'en'];
        
        const isUpdate = currentId !== null;
        const activeBtn = isUpdate ? e('updateBtn') : e('saveBtn');
        
        activeBtn.disabled = true;
        activeBtn.textContent = isUpdate ? t.updating : t.saving;
        isSubmitting = true;
        
        try {
            let admNo = e('admNo').value;
            
            if (!currentId) {
                const nextAdmNo = await getNextAdmissionNumber();
                if (!nextAdmNo) {
                    throw new Error('Failed to get admission number');
                }
                admNo = nextAdmNo.toString();
                e('admNo').value = admNo;
            }
            
            const data = {
                admNo: admNo, 
                name: e('name').value, 
                class: e('class').value,
                fatherName: e('fatherName').value, 
                phone: e('phone').value,
                dob: e('dob').value, 
                admissionDate: e('admissionDate').value,
                photo: e('studentPhoto').src || ''
            };
            
            if (currentId) {
                await studentsRef.child(currentId).update(data);
                showMessage(t.updated);
            } else {
                await studentsRef.push({
                    ...data,
                    createdAt: new Date().toISOString()
                });
                showMessage(t.saved);
            }
            
            resetForm();
            
        } catch (error) {
            console.error('Error saving data:', error);
            showMessage('Error: ' + error.message, false);
        } finally {
            activeBtn.disabled = false;
            activeBtn.textContent = isUpdate ? t.update : t.save;
            isSubmitting = false;
        }
    };

    // Function to load next admission number into the form
    async function loadNextAdmissionNumber() {
        try {
            const snapshot = await counterRef.child('admissionNo').once('value');
            const currentCount = snapshot.val() || 0;
            e('admNo').value = (currentCount + 1).toString();
        } catch (error) {
            console.error('Error loading admission number:', error);
        }
    }

    function resetForm() {
        e('studentForm').reset();
        e('studentPhoto').classList.add('hidden');
        e('userIcon').classList.remove('hidden');
        e('studentPhoto').src = '';
        currentId = null;
        e('saveBtn').classList.remove('hidden');
        e('updateBtn').classList.add('hidden');
        
        loadNextAdmissionNumber();
        setAutoAdmissionDate();  // <--- auto date on reset
    }

    // Edit Function
    window.editStudent = (id) => {
        const student = students.find(s => s.id === id);
        if (!student) return;
        
        currentId = id;
        e('admNo').value = student.admNo || '';
        e('name').value = student.name || '';
        e('class').value = student.class || '';
        e('fatherName').value = student.fatherName || '';
        e('phone').value = student.phone || '';
        e('dob').value = student.dob || '';
        e('admissionDate').value = student.admissionDate || '';
        
        if (student.photo) {
            e('studentPhoto').src = student.photo;
            e('studentPhoto').classList.remove('hidden');
            e('userIcon').classList.add('hidden');
        }
        
        e('saveBtn').classList.add('hidden');
        e('updateBtn').classList.remove('hidden');
        e('updateBtn').disabled = false; 
        
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab, .nav-item').forEach(t => t.classList.remove('active'));
        e('addPanel').classList.add('active');
        document.querySelector('[data-tab="add"]').classList.add('active');
    };

    // Delete Function
    window.deleteMe = async (id) => {
        if(confirm(isUrdu ? 'کیا آپ اسے حذف کرنا چاہتے ہیں؟' : 'Delete this?')) {
            try {
                await db.ref('students/'+id).remove();
                showMessage(isUrdu ? 'حذف کر دیا گیا' : 'Deleted successfully');
            } catch (error) {
                console.error('Error deleting:', error);
                showMessage('Error deleting', false);
            }
        }
    };

    // Print Function
    window.printStudent = (id) => {
        const student = students.find(s => s.id === id);
        if (!student) return;
        generateCertificate(student);
    };

    // Generate Certificate
    function generateCertificate(student) {
        const t = isUrdu ? translations.ur : translations.en;
        const today = new Date().toLocaleDateString();
        
        const certHTML = `
            <div class="certificate">
                <h1>${t.schoolName}</h1>
                <h2>${t.certificate}</h2>
                
                <div class="student-name">${student.name}</div>
                
                <div class="certificate-details">
                    <p><strong>${t.admNoLabel}:</strong> ${student.admNo}</p>
                    <p><strong>${t.class}:</strong> ${student.class}</p>
                    <p><strong>${t.fatherNameLabel}:</strong> ${student.fatherName}</p>
                    <p><strong>${t.phoneLabel}:</strong> ${student.phone}</p>
                    <p><strong>${t.dobLabel}:</strong> ${new Date(student.dob).toLocaleDateString()}</p>
                    <p><strong>${t.admissionDateLabel}:</strong> ${new Date(student.admissionDate).toLocaleDateString()}</p>
                </div>
                
                <div class="certificate-footer">
                    <div class="certificate-signature">
                        <div class="line">${t.issuedDate}: ${today}</div>
                    </div>
                    <div class="certificate-signature">
                        <div class="line">${t.principal}</div>
                    </div>
                </div>
            </div>
        `;
        
        e('certificateContent').innerHTML = certHTML;
        e('certificateModal').style.display = 'flex';
    }

    // Close Modal
    e('closeModal').onclick = () => {
        e('certificateModal').style.display = 'none';
    };

    // Print Certificate
    e('printCertificate').onclick = () => {
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html>
                <head>
                    <title>Student Certificate</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 40px; }
                        .certificate { border: 10px solid #2c3e50; padding: 40px; text-align: center; background: linear-gradient(135deg, #fff 0%, #f5f5f5 100%); }
                        h1 { font-size: 2rem; color: #2c3e50; }
                        h2 { font-size: 1.5rem; color: #27ae60; border-bottom: 2px dashed #27ae60; padding-bottom: 10px; }
                        .student-name { font-size: 2.5rem; color: #e74c3c; margin: 30px 0; font-weight: bold; }
                        .details { text-align: left; margin: 30px 0; font-size: 1.1rem; line-height: 2; }
                        .footer { display: flex; justify-content: space-between; margin-top: 50px; }
                        .signature { text-align: center; }
                        .signature .line { width: 200px; border-top: 2px solid #333; margin-top: 40px; padding-top: 10px; }
                    </style>
                </head>
                <body>
                    ${e('certificateContent').innerHTML}
                </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    };

    // Export to Excel
    e('exportExcelBtn').onclick = () => {
        const exportData = students.map(s => ({
            'Admission No': s.admNo,
            'Name': s.name,
            'Class': s.class,
            "Father's Name": s.fatherName,
            'Phone': s.phone,
            'Date of Birth': new Date(s.dob).toLocaleDateString(),
            'Admission Date': new Date(s.admissionDate).toLocaleDateString()
        }));
        
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(exportData);
        XLSX.utils.book_append_sheet(wb, ws, "Students");
        XLSX.writeFile(wb, `students_${new Date().toISOString().slice(0,10)}.xlsx`);
    };

    function renderList() {
        const searchTerm = e('searchInput').value.toLowerCase();
        const filtered = students.filter(s => 
            s.name?.toLowerCase().includes(searchTerm) || 
            s.admNo?.toLowerCase().includes(searchTerm) ||
            s.fatherName?.toLowerCase().includes(searchTerm)
        );
        
        const t = isUrdu ? translations.ur : translations.en;
        
        const list = e('studentList');
        list.innerHTML = filtered.map(s => `
            <div class="student-card">
                <div class="student-avatar">
                    ${s.photo ? `<img src="${s.photo}">` : '<i class="fas fa-user fa-2x"></i>'}
                </div>
                <div style="flex:1">
                    <div style="font-weight:bold">${s.name}</div>
                    <div style="font-size:0.8rem; color:#666">${t.class}: ${s.class} | ${t.admNoLabel}: ${s.admNo}</div>
                    <div class="student-actions">
                        <button class="action-btn print" onclick="printStudent('${s.id}')"><i class="fas fa-print"></i> ${t.print}</button>
                        <button class="action-btn edit" onclick="editStudent('${s.id}')"><i class="fas fa-edit"></i> ${t.edit}</button>
                        <button class="action-btn delete" onclick="deleteMe('${s.id}')"><i class="fas fa-trash"></i> ${t.delete}</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Search Input
    e('searchInput').addEventListener('input', renderList);

    // Navigation Logic
    document.querySelectorAll('.tab, .nav-item').forEach(btn => {
        btn.onclick = () => {
            const tab = btn.dataset.tab || btn.dataset.nav;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab, .nav-item').forEach(t => t.classList.remove('active'));
            e(tab + 'Panel').classList.add('active');
            btn.classList.add('active');
            
            if (tab === 'add') {
                loadNextAdmissionNumber();
                setAutoAdmissionDate(); // auto date on navigation to add
            }
        };
    });

    // Photo Upload: mobile camera + gallery (capture="environment" allows both on most devices)
    e('uploadBtn').onclick = () => e('photoInput').click();
    e('photoInput').onchange = (ev) => {
        const file = ev.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (res) => {
                e('studentPhoto').src = res.target.result;
                e('studentPhoto').classList.remove('hidden');
                e('userIcon').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }
    };

    // Update Button Click
    e('updateBtn').onclick = (event) => {
        event.preventDefault();
        if (!currentId) {
            showMessage('No record selected for update', false);
            return;
        }
        e('studentForm').dispatchEvent(new Event('submit'));
    };

    // Initialize: load next admission number and set auto admission date
    window.onload = function() {
        initializeCounter();
        setTimeout(() => {
            loadNextAdmissionNumber();
            setAutoAdmissionDate();  // <--- set today's date on page load
        }, 500);
    };
</script>
</body>
</html>
